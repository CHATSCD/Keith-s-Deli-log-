<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deli Count — Keith's #184 Waveland</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3348;
    --accent: #f59e0b;
    --accent2: #fbbf24;
    --green: #10b981;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #e2e8f0;
    --muted: #64748b;
    --dim: #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .header-right {
    display: flex; align-items: center; gap: 10px;
  }

  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--dim);
  }
  .badge span { color: var(--accent); font-weight: 600; }

  main {
    flex: 1;
    padding: 20px;
    max-width: 700px;
    margin: 0 auto;
    width: 100%;
  }

  /* Voice orb */
  .voice-section {
    text-align: center;
    margin: 10px 0 24px;
  }

  .orb-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 14px;
  }

  .orb {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #f59e0b44, #f59e0b11 60%, transparent);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .orb::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 70%, var(--accent) 100%);
    opacity: 0;
    transition: opacity 0.3s;
    animation: spin 2s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .orb.listening::before { opacity: 1; }

  .orb.listening {
    border-color: var(--accent);
    box-shadow: 0 0 40px var(--accent)44, 0 0 80px var(--accent)22;
    background: radial-gradient(circle at 38% 38%, #f59e0b66, #f59e0b22 60%, transparent);
  }

  .orb-inner {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 4px;
    z-index: 1;
    font-size: 28px;
    transition: all 0.2s;
  }

  .orb.listening .orb-inner { border-color: var(--accent)88; }

  .orb-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .orb.listening .orb-label { color: var(--accent); }

  /* Transcript bubble */
  .transcript-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    color: var(--dim);
    min-height: 44px;
    max-width: 500px;
    margin: 0 auto 8px;
    font-style: italic;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .transcript-bubble.active {
    border-color: var(--accent)66;
    color: var(--text);
    font-style: normal;
  }

  /* Confirm card */
  .confirm-card {
    background: var(--surface);
    border: 1px solid var(--accent)44;
    border-radius: 16px;
    padding: 20px;
    max-width: 500px;
    margin: 0 auto 20px;
    display: none;
  }
  .confirm-card.visible { display: block; }

  .confirm-item-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--accent2);
  }
  .confirm-item-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
  }
  .confirm-item-meta span { color: var(--dim); }

  .qty-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .qty-label { font-size: 14px; color: var(--dim); flex: 1; }
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-input-confirm {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    width: 100px;
    text-align: center;
    color: var(--accent);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 4px;
    outline: none;
  }
  .qty-input-confirm:focus { border-color: var(--accent); }
  .qty-mic-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .qty-mic-btn:hover { border-color: var(--accent); color: var(--accent); }
  .qty-mic-btn.mic-active {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px var(--accent)66;
  }

  .confirm-actions {
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .btn-confirm {
    background: var(--accent);
    color: #000;
  }
  .btn-confirm:hover { background: var(--accent2); }
  .btn-cancel {
    background: var(--surface2);
    color: var(--dim);
    border: 1px solid var(--border);
  }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }
  .btn-danger { background: var(--red)1a; color: var(--red); border: 1px solid var(--red)44; }
  .btn-danger:hover { background: var(--red)33; }

  /* Multiple matches */
  .matches-card {
    background: var(--surface);
    border: 1px solid var(--blue)44;
    border-radius: 16px;
    padding: 20px;
    max-width: 500px;
    margin: 0 auto 20px;
    display: none;
  }
  .matches-card.visible { display: block; }
  .matches-title { font-size: 13px; font-weight: 600; color: var(--blue); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }

  .match-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .match-item:hover { border-color: var(--accent); }
  .match-item:last-child { margin-bottom: 0; }
  .match-name { font-size: 14px; font-weight: 500; }
  .match-bek { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .match-storage { font-size: 11px; color: var(--dim); background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; }
  .match-main { display: flex; align-items: center; gap: 10px; }
  .match-thumb {
    flex-shrink: 0;
    width: 32px; height: 32px;
    border-radius: 7px;
    object-fit: cover;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    color: var(--muted);
  }

  /* Photos */
  .item-thumb-wrap { flex-shrink: 0; }
  .item-thumb {
    width: 38px; height: 38px;
    border-radius: 8px;
    object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 16px;
    color: var(--muted);
    transition: border-color 0.15s;
  }
  .item-thumb:hover { border-color: var(--accent); }

  .confirm-photo {
    width: 100%;
    max-height: 200px;
    min-height: 64px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-bottom: 12px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    transition: border-color 0.15s;
  }
  .confirm-photo:hover { border-color: var(--accent); }
  .confirm-photo img { width: 100%; max-height: 200px; object-fit: cover; display: block; }

  .photo-lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .photo-lightbox.visible { display: flex; }
  .photo-lightbox-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    max-width: 420px;
    width: 100%;
  }
  .photo-lightbox-name { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .photo-lightbox-img-wrap {
    width: 100%;
    min-height: 160px;
    max-height: 320px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    margin-bottom: 16px;
    color: var(--muted);
    font-size: 13px;
  }
  .photo-lightbox-img-wrap img { width: 100%; max-height: 320px; object-fit: contain; display: block; }
  .photo-lightbox-actions { display: flex; gap: 10px; margin-bottom: 10px; }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 40px 11px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent)66; }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Item list */
  .items-section {}
  .section-header {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 4px 0 8px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .section-header:first-child { border-top: none; margin-top: 0; }

  .item-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
    gap: 10px;
  }
  .item-row:hover { background: var(--surface); border-color: var(--border); }
  .item-row.updated { border-color: var(--green)44; background: #10b98108; }

  .item-desc {
    flex: 1;
    font-size: 13px;
  }
  .item-cat {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .item-unit {
    font-size: 10px;
    color: var(--muted);
    max-width: 100px;
    text-align: right;
    line-height: 1.3;
  }
  .item-qty-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    width: 56px;
    text-align: center;
    color: var(--dim);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 4px;
    outline: none;
    transition: border-color 0.15s, color 0.15s;
  }
  .item-qty-input:focus { border-color: var(--accent)88; color: var(--text); }
  .item-qty-input.nonzero { color: var(--accent); border-color: var(--accent)44; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    font-weight: 600;
    font-size: 14px;
    padding: 12px 20px;
    border-radius: 10px;
    transition: transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); color: #fff; }

  /* Download btn */
  .download-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .download-btn:hover { border-color: var(--accent)66; color: var(--accent); }

  /* Pulse animation for listening */
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .orb.listening { animation: pulse 1.5s ease-in-out infinite; }

  .no-results { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }

  .shortcut-hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 6px;
  }
  .shortcut-hint kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🥗</div>
    <div>
      <div class="logo-text">Deli Counter</div>
      <div class="logo-sub">Keith's #184 — Waveland</div>
    </div>
  </div>
  <div class="header-right">
    <div class="badge">Updated: <span id="updatedCount">0</span></div>
    <button class="download-btn" onclick="downloadXLSX()">⬇ Export XLSX</button>
    <button class="download-btn" onclick="clearInventory()">🧹 Clear</button>
  </div>
</header>

<main>
  <!-- Voice Section -->
  <div class="voice-section">
    <div class="orb-wrap">
      <div class="orb" id="orb" onclick="toggleVoice()" title="Tap to start recording, tap again to stop">
        <div class="orb-inner">
          <span id="orbIcon">🎤</span>
          <span class="orb-label" id="orbLabel">Tap to speak</span>
        </div>
      </div>
    </div>
    <div class="transcript-bubble" id="transcriptBubble">Say an item name or description...</div>
    <div class="shortcut-hint">Press <kbd>Space</kbd> to start/stop recording · numbers you say auto-save</div>
  </div>

  <!-- Confirm Card (already auto-saved; lets you fine-tune the qty) -->
  <div class="confirm-card" id="confirmCard">
    <div class="confirm-photo" id="confirmPhoto" onclick="openPhotoLightbox(currentItem)"></div>
    <div class="confirm-item-name" id="confirmName"></div>
    <div class="confirm-item-meta"><span id="confirmSection"></span> · <span id="confirmCategory"></span> · <span id="confirmUnit"></span><span id="confirmBek"></span></div>
    <div class="qty-row">
      <div class="qty-label">Saved on hand:</div>
      <div class="qty-controls">
        <input type="number" min="0" step="0.1" inputmode="decimal" class="qty-input-confirm" id="qtyInput" value="1" oninput="handleConfirmQtyInput(this.value)">
        <button class="qty-mic-btn" id="qtyMicBtn" onclick="toggleQtyVoice()" title="Speak the quantity">🎤</button>
      </div>
    </div>
    <div class="confirm-actions">
      <button class="btn btn-confirm" onclick="closeConfirm()" style="flex:1">✓ Done</button>
    </div>
  </div>

  <!-- Multiple Matches Card -->
  <div class="matches-card" id="matchesCard">
    <div class="matches-title">🔍 Multiple matches — which one?</div>
    <div id="matchesList"></div>
  </div>

  <!-- Search + Filter -->
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search by item name or category..." oninput="renderList()">
    <span class="search-icon">🔍</span>
  </div>
  <div class="filter-tabs" id="filterTabs"></div>

  <!-- Items List -->
  <div id="itemsList"></div>
</main>

<input type="file" accept="image/*" capture="environment" id="photoFileInput" style="display:none">

<div class="photo-lightbox" id="photoLightbox">
  <div class="photo-lightbox-card">
    <div class="photo-lightbox-name" id="lightboxName"></div>
    <div class="photo-lightbox-img-wrap" id="lightboxImgWrap"></div>
    <div class="photo-lightbox-actions">
      <button class="btn btn-confirm" id="lightboxChooseBtn">📷 Take / Choose Photo</button>
      <button class="btn btn-danger" id="lightboxRemoveBtn">🗑 Remove</button>
    </div>
    <button class="btn btn-cancel" id="lightboxCloseBtn">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>

// State
const STORAGE_KEY = 'deliInventoryState';
let items = INVENTORY.map(i => ({...i}));
let currentItem = null;
let pendingQty = 1;
let mediaRecorder = null;
let audioChunks = [];
let recording = false;
let transcribing = false;
let activeFilter = 'All';
let updatedRows = new Set();

// ── PERSISTENCE (auto-save until exported & cleared) ─────────────────────────
function saveState() {
  const onHand = {};
  items.forEach(i => { if (i.on_hand) onHand[i.id] = i.on_hand; });
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    onHand,
    updated: Array.from(updatedRows)
  }));
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    items.forEach(i => {
      if (data.onHand && data.onHand[i.id] != null) i.on_hand = data.onHand[i.id];
    });
    updatedRows = new Set(data.updated || []);
  } catch (e) { /* ignore corrupt state */ }
}

function clearInventory() {
  if (!confirm('Clear all entered quantities? This cannot be undone.')) return;
  items.forEach(i => i.on_hand = 0);
  updatedRows.clear();
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('updatedCount').textContent = '0';
  renderList();
  showToast('🧹 Inventory cleared');
}

// ── PHOTOS (stored locally in this browser via IndexedDB; not cleared above) ─
const PHOTO_DB_NAME = 'deliPhotoDB';
const PHOTO_STORE = 'photos';
let photoCache = new Map();
let pendingPhotoItemId = null;

function openPhotoDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(PHOTO_DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(PHOTO_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function loadAllPhotos() {
  try {
    const db = await openPhotoDB();
    const tx = db.transaction(PHOTO_STORE, 'readonly');
    const store = tx.objectStore(PHOTO_STORE);
    const keysReq = store.getAllKeys();
    const valsReq = store.getAll();
    await new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    (keysReq.result || []).forEach((id, i) => photoCache.set(id, valsReq.result[i]));
    renderList();
  } catch (e) { /* IndexedDB unavailable; photo feature degrades to no-op */ }
}

function savePhoto(id, dataUrl) {
  return openPhotoDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readwrite');
    tx.objectStore(PHOTO_STORE).put(dataUrl, id);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  })).then(() => { photoCache.set(id, dataUrl); });
}

function deletePhoto(id) {
  return openPhotoDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readwrite');
    tx.objectStore(PHOTO_STORE).delete(id);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  })).then(() => { photoCache.delete(id); });
}

function resizeImageFile(file, maxDim = 480, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function openPhotoInputFor(id) {
  pendingPhotoItemId = id;
  document.getElementById('photoFileInput').click();
}

function openPhotoLightbox(item) {
  if (!item) return;
  pendingPhotoItemId = item.id;
  document.getElementById('lightboxName').textContent = item.desc;
  const wrap = document.getElementById('lightboxImgWrap');
  const photo = photoCache.get(item.id);
  wrap.innerHTML = photo ? `<img src="${photo}">` : 'No photo yet';
  document.getElementById('lightboxRemoveBtn').style.display = photo ? '' : 'none';
  document.getElementById('photoLightbox').classList.add('visible');
}

function closePhotoLightbox() {
  document.getElementById('photoLightbox').classList.remove('visible');
}

function renderConfirmPhoto(item) {
  const el = document.getElementById('confirmPhoto');
  const photo = photoCache.get(item.id);
  el.innerHTML = photo ? `<img src="${photo}">` : '📷 Add photo';
}

async function handlePhotoFileSelected(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file || pendingPhotoItemId == null) return;
  const id = pendingPhotoItemId;
  try {
    const dataUrl = await resizeImageFile(file);
    await savePhoto(id, dataUrl);
    renderList();
    if (currentItem && currentItem.id === id) renderConfirmPhoto(currentItem);
    if (document.getElementById('photoLightbox').classList.contains('visible')) {
      openPhotoLightbox(items.find(i => i.id === id));
    }
    showToast('📷 Photo saved');
  } catch (err) {
    showToast('Could not save photo', true);
  }
}

async function removeCurrentPhoto() {
  if (pendingPhotoItemId == null) return;
  const id = pendingPhotoItemId;
  await deletePhoto(id);
  renderList();
  if (currentItem && currentItem.id === id) renderConfirmPhoto(currentItem);
  closePhotoLightbox();
  showToast('🗑 Photo removed');
}

// ── SEARCH / MATCH ───────────────────────────────────────────────────────────
function normalize(s) {
  return s.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
}

function scoreMatch(item, query) {
  const q = normalize(query);
  const desc = normalize(item.desc);

  // Exact desc match
  if (desc === q) return 85;
  // Desc starts with query
  if (desc.startsWith(q)) return 80;
  // All query words in desc
  const words = q.split(' ').filter(w => w.length > 1);
  const matches = words.filter(w => desc.includes(w));
  if (matches.length === words.length) return 60 + matches.length;
  // Partial word matches
  if (matches.length > 0) return 30 + matches.length * 5;
  return 0;
}

function getScoredMatches(query) {
  if (!query.trim()) return [];
  return items.map(item => ({ item, score: scoreMatch(item, query) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score);
}

function findMatches(query) {
  return getScoredMatches(query).slice(0, 6).map(x => x.item);
}

// ── VOICE (MediaRecorder → OpenAI Whisper via /api/transcribe) ──────────────
// voiceTarget: 'item' (main orb — identify an item) or 'qty' (qty mic — just a number)
let voiceTarget = 'item';

function toggleVoice() {
  toggleRecording('item');
}

function toggleQtyVoice() {
  toggleRecording('qty');
}

function toggleRecording(target) {
  if (recording) {
    stopRecording();
  } else if (!transcribing) {
    voiceTarget = target;
    startRecording();
  }
}

async function startRecording() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === 'undefined') {
    showToast('Microphone recording not supported in this browser.', true);
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
    mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);

    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      handleRecordingStop();
    };

    mediaRecorder.start();
    recording = true;
    if (voiceTarget === 'qty') {
      document.getElementById('qtyMicBtn').classList.add('mic-active');
      document.getElementById('qtyMicBtn').textContent = '🔴';
    } else {
      document.getElementById('orb').classList.add('listening');
      document.getElementById('orbIcon').textContent = '🔴';
      document.getElementById('orbLabel').textContent = 'Listening... tap to stop';
    }
    setTranscript('Listening...', true);
  } catch (err) {
    showToast('Microphone access denied or unavailable.', true);
  }
}

function stopRecording() {
  if (mediaRecorder && recording) {
    try { mediaRecorder.stop(); } catch (e) {}
  }
  recording = false;
  document.getElementById('orb').classList.remove('listening');
}

async function handleRecordingStop() {
  if (audioChunks.length === 0) {
    resetOrb();
    return;
  }
  transcribing = true;
  if (voiceTarget === 'qty') {
    document.getElementById('qtyMicBtn').textContent = '⏳';
  } else {
    document.getElementById('orbIcon').textContent = '⏳';
    document.getElementById('orbLabel').textContent = 'Transcribing...';
  }
  setTranscript('Transcribing...', true);

  try {
    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
    const base64 = await blobToBase64(blob);
    const res = await fetch('/api/transcribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ audio: base64, mimeType: blob.type })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Transcription failed');

    const text = (data.text || '').trim();
    if (!text) {
      setTranscript("Didn't catch that — try again", false);
      showToast('No speech detected.', true);
    } else if (voiceTarget === 'qty') {
      applyVoiceQty(text);
    } else {
      setTranscript(text, true);
      processVoiceInput(text);
    }
  } catch (err) {
    showToast('Transcription error: ' + err.message, true);
    setTranscript('Say an item name or description...', false);
  } finally {
    transcribing = false;
    resetOrb();
  }
}

function applyVoiceQty(text) {
  const num = parseQtyFromSpeech(text);
  if (num == null) {
    setTranscript(`Didn't catch a number in "${text}"`, false);
    showToast('No quantity heard. Try again.', true);
    return;
  }
  document.getElementById('qtyInput').value = num;
  handleConfirmQtyInput(num);
  setTranscript(`Saved ${currentItem ? currentItem.desc : 'qty'} = ${num}`, true);
}

const NUM_WORDS = {
  zero: 0, one: 1, two: 2, three: 3, four: 4, five: 5, six: 6, seven: 7,
  eight: 8, nine: 9, ten: 10, eleven: 11, twelve: 12, thirteen: 13,
  fourteen: 14, fifteen: 15, sixteen: 16, seventeen: 17, eighteen: 18,
  nineteen: 19, twenty: 20, half: 0.5, quarter: 0.25
};

// Extracts a quantity (handles digits, decimals, "point two"/"point 3", and
// spelled-out number words) from speech text, returning the remaining text
// with the number removed so it can still be matched against item names.
function extractQtyAndRest(text) {
  let t = text.toLowerCase();
  t = t.replace(/\bpoint\s+(\w+)/g, (m, w) => '.' + (NUM_WORDS[w] !== undefined ? NUM_WORDS[w] : w));

  const m = t.match(/-?\d+(?:\.\d+)?|-?\.\d+/);
  if (m) {
    return { qty: Math.max(0, parseFloat(m[0])), rest: t.replace(m[0], '').trim(), found: true };
  }

  const words = t.split(/\s+/);
  for (let i = 0; i < words.length; i++) {
    if (NUM_WORDS[words[i]] !== undefined) {
      const qty = NUM_WORDS[words[i]];
      words.splice(i, 1);
      return { qty, rest: words.join(' ').trim(), found: true };
    }
  }
  return { qty: 1, rest: t, found: false };
}

function parseQtyFromSpeech(text) {
  const result = extractQtyAndRest(text);
  return result.found ? result.qty : null;
}

function resetOrb() {
  document.getElementById('orbIcon').textContent = '🎤';
  document.getElementById('orbLabel').textContent = 'Tap to speak';
  document.getElementById('qtyMicBtn').classList.remove('mic-active');
  document.getElementById('qtyMicBtn').textContent = '🎤';
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function setTranscript(text, active) {
  const el = document.getElementById('transcriptBubble');
  el.textContent = text;
  el.className = 'transcript-bubble' + (active ? ' active' : '');
}

function processVoiceInput(text) {
  // Extract a number from the phrase ("I saved 3 cases of chicken patty",
  // "point two cases of chicken patty", "0.2 cases...")
  const extracted = extractQtyAndRest(text);
  const qty = extracted.qty;
  text = extracted.rest;

  // Normalize common speech artifacts
  text = text
    .replace(/\b(i have|i saved|i counted|saved|counted|we have|on hand)\b/gi, '')
    .replace(/\b(cases?|bags?|boxes?|packs?|sleeves?|units?|cans?)\b/gi, '')
    .trim();

  const scored = getScoredMatches(text);

  if (scored.length === 0) {
    setTranscript(`No match for "${text}" — try searching below`, false);
    showToast('No item found. Try typing in search.', true);
  } else if (scored.length === 1 ||
             (scored[0].score >= 80 && scored[0].score > scored[1].score) ||
             scored[0].score - scored[1].score >= 20) {
    // Clear winner — auto-confirm and save immediately, no tap needed
    openConfirm(scored[0].item, qty);
  } else {
    // Genuinely ambiguous — pick one, which auto-saves immediately
    const matches = scored.slice(0, 6).map(x => x.item);
    openMatchesPicker(matches, qty);
  }
}

// ── CONFIRM CARD (auto-saves immediately, no manual confirm needed) ─────────
function openConfirm(item, qty = 1) {
  currentItem = item;
  pendingQty = Math.max(0, qty);
  document.getElementById('confirmName').textContent = item.desc;
  document.getElementById('confirmSection').textContent = item.section;
  document.getElementById('confirmCategory').textContent = item.category || 'N/A';
  document.getElementById('confirmUnit').textContent = item.unit || '';
  document.getElementById('confirmBek').textContent = item.bek ? ` · BEK# ${item.bek}` : '';
  renderConfirmPhoto(item);
  document.getElementById('qtyInput').value = pendingQty;
  document.getElementById('confirmCard').classList.add('visible');
  document.getElementById('matchesCard').classList.remove('visible');
  applyQty(); // auto-save the instant we have an item + qty
}

function closeConfirm() {
  document.getElementById('confirmCard').classList.remove('visible');
  currentItem = null;
  setTranscript('Say an item name or description...', false);
}

function handleConfirmQtyInput(value) {
  pendingQty = Math.max(0, parseFloat(value) || 0);
  applyQty();
}

function applyQty() {
  if (!currentItem) return;
  currentItem.on_hand = pendingQty;
  updatedRows.add(currentItem.id);
  saveState();
  document.getElementById('updatedCount').textContent = updatedRows.size;
  showToast(`✓ ${currentItem.desc} → ${pendingQty} (auto-saved)`);
  setTranscript(`Saved ${currentItem.desc} = ${pendingQty}`, true);
  renderList();
}

// ── MULTIPLE MATCHES ─────────────────────────────────────────────────────────
function openMatchesPicker(matches, qty) {
  const list = document.getElementById('matchesList');
  list.innerHTML = '';
  matches.forEach(item => {
    const div = document.createElement('div');
    div.className = 'match-item';
    const matchMeta = [item.category || '', item.bek ? `BEK# ${item.bek}` : ''].filter(Boolean).join(' · ');
    const photo = photoCache.get(item.id);
    const thumbHtml = photo ? `<img class="match-thumb" src="${photo}">` : `<div class="match-thumb">📷</div>`;
    div.innerHTML = `
      <div class="match-main">
        ${thumbHtml}
        <div>
          <div class="match-name">${item.desc}</div>
          <div class="match-bek">${matchMeta}</div>
        </div>
      </div>
      <div class="match-storage">${item.section || '—'}</div>`;
    div.onclick = () => openConfirm(item, qty);
    list.appendChild(div);
  });
  document.getElementById('matchesCard').classList.add('visible');
  document.getElementById('confirmCard').classList.remove('visible');
}

// ── FILTER TABS ───────────────────────────────────────────────────────────────
function buildTabs() {
  const sections = ['All', ...new Set(items.map(i => i.section).filter(Boolean))];
  const tabs = document.getElementById('filterTabs');
  tabs.innerHTML = '';
  sections.forEach(label => {
    const div = document.createElement('div');
    div.className = 'tab' + (label === activeFilter ? ' active' : '');
    div.textContent = label;
    div.onclick = () => { activeFilter = label; buildTabs(); renderList(); };
    tabs.appendChild(div);
  });
}

// ── ITEM LIST ─────────────────────────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = items.filter(item => {
    const matchSearch = !q ||
      item.desc.toLowerCase().includes(q) ||
      (item.category || '').toLowerCase().includes(q);
    const matchFilter = activeFilter === 'All' || item.section === activeFilter;
    return matchSearch && matchFilter;
  });

  const container = document.getElementById('itemsList');
  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No items match that search.</div>';
    return;
  }

  // Group by section
  const groups = {};
  filtered.forEach(item => {
    const g = item.section || 'Other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(item);
  });

  Object.entries(groups).forEach(([group, groupItems]) => {
    const header = document.createElement('div');
    header.className = 'section-header';
    header.textContent = group;
    container.appendChild(header);

    groupItems.forEach(item => {
      const row = document.createElement('div');
      row.id = `row-${item.id}`;
      row.className = 'item-row' + (updatedRows.has(item.id) ? ' updated' : '');
      const qtyClass = item.on_hand > 0 ? 'nonzero' : '';
      const catText = item.category && item.category !== 'General' ? item.category : '';
      const bekText = item.bek ? `BEK# ${item.bek}` : '';
      const metaText = [catText, bekText].filter(Boolean).join(' · ');
      const photo = photoCache.get(item.id);
      const thumbHtml = photo ? `<img class="item-thumb" src="${photo}">` : `<div class="item-thumb">📷</div>`;
      row.innerHTML = `
        <div class="item-thumb-wrap">${thumbHtml}</div>
        <div class="item-desc">${item.desc}<div class="item-cat">${metaText}</div></div>
        <div class="item-unit">${item.unit || ''}</div>
        <input type="number" min="0" step="0.1" inputmode="decimal" class="item-qty-input ${qtyClass}" id="qty-${item.id}" value="${item.on_hand}">`;
      container.appendChild(row);
      const input = row.querySelector('input');
      input.addEventListener('input', () => handleQtyInput(item.id, input.value));
      input.addEventListener('click', e => e.stopPropagation());
      row.querySelector('.item-thumb-wrap').addEventListener('click', e => {
        e.stopPropagation();
        openPhotoLightbox(item);
      });
    });
  });
}

function handleQtyInput(id, value) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const qty = Math.max(0, parseFloat(value) || 0);
  item.on_hand = qty;
  updatedRows.add(id);
  saveState();
  document.getElementById('updatedCount').textContent = updatedRows.size;
  const row = document.getElementById(`row-${id}`);
  if (row) {
    row.classList.add('updated');
    const input = row.querySelector('input');
    input.classList.toggle('nonzero', qty > 0);
  }
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function downloadXLSX() {
  const wsData = [
    ['Section', 'Category', 'Item', 'Unit', 'Cost/Unit', 'PAR', 'On Hand'],
    ...items.map(i => [i.section, i.category, i.desc, i.unit, i.cost, i.par, i.on_hand])
  ];

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws['!cols'] = [{ wch: 14 }, { wch: 16 }, { wch: 50 }, { wch: 25 }, { wch: 10 }, { wch: 8 }, { wch: 10 }];

  XLSX.utils.book_append_sheet(wb, ws, 'Inventory');
  XLSX.writeFile(wb, `Deli_Inventory_Updated_${new Date().toISOString().split('T')[0]}.xlsx`);
  showToast('📥 XLSX exported!');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 3000);
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); toggleVoice(); }
  if (e.code === 'Enter' && currentItem) closeConfirm();
  if (e.code === 'Escape') closeConfirm();
  if (e.code === 'ArrowUp' && currentItem) handleConfirmQtyInput(document.getElementById('qtyInput').value = pendingQty + 1);
  if (e.code === 'ArrowDown' && currentItem) handleConfirmQtyInput(document.getElementById('qtyInput').value = Math.max(0, pendingQty - 1));
});

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('photoFileInput').addEventListener('change', handlePhotoFileSelected);
document.getElementById('lightboxChooseBtn').addEventListener('click', () => openPhotoInputFor(pendingPhotoItemId));
document.getElementById('lightboxRemoveBtn').addEventListener('click', removeCurrentPhoto);
document.getElementById('lightboxCloseBtn').addEventListener('click', closePhotoLightbox);
document.getElementById('photoLightbox').addEventListener('click', e => {
  if (e.target.id === 'photoLightbox') closePhotoLightbox();
});

loadState();
buildTabs();
renderList();
loadAllPhotos();
document.getElementById('updatedCount').textContent = updatedRows.size;
</script>
</body>
