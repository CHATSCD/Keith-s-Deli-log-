<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deli Count — Keith's #184 Waveland</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3348;
    --accent: #f59e0b;
    --accent2: #fbbf24;
    --green: #10b981;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #e2e8f0;
    --muted: #64748b;
    --dim: #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .header-right {
    display: flex; align-items: center; gap: 10px;
  }

  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--dim);
  }
  .badge span { color: var(--accent); font-weight: 600; }

  main {
    flex: 1;
    padding: 20px;
    max-width: 700px;
    margin: 0 auto;
    width: 100%;
  }

  /* Voice orb */
  .voice-section {
    text-align: center;
    margin: 10px 0 24px;
  }

  .orb-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 14px;
  }

  .orb {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #f59e0b44, #f59e0b11 60%, transparent);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .orb::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 70%, var(--accent) 100%);
    opacity: 0;
    transition: opacity 0.3s;
    animation: spin 2s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .orb.listening::before { opacity: 1; }

  .orb.listening {
    border-color: var(--accent);
    box-shadow: 0 0 40px var(--accent)44, 0 0 80px var(--accent)22;
    background: radial-gradient(circle at 38% 38%, #f59e0b66, #f59e0b22 60%, transparent);
  }

  .orb-inner {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 4px;
    z-index: 1;
    font-size: 28px;
    transition: all 0.2s;
  }

  .orb.listening .orb-inner { border-color: var(--accent)88; }

  .orb-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .orb.listening .orb-label { color: var(--accent); }

  /* Transcript bubble */
  .transcript-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    color: var(--dim);
    min-height: 44px;
    max-width: 500px;
    margin: 0 auto 8px;
    font-style: italic;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .transcript-bubble.active {
    border-color: var(--accent)66;
    color: var(--text);
    font-style: normal;
  }

  /* Confirm card */
  .confirm-card {
    background: var(--surface);
    border: 1px solid var(--accent)44;
    border-radius: 16px;
    padding: 20px;
    max-width: 500px;
    margin: 0 auto 20px;
    display: none;
  }
  .confirm-card.visible { display: block; }

  .confirm-item-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--accent2);
  }
  .confirm-item-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
  }
  .confirm-item-meta span { color: var(--dim); }

  .qty-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .qty-label { font-size: 14px; color: var(--dim); flex: 1; }
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
  .qty-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    min-width: 60px;
    text-align: center;
    color: var(--accent);
  }

  .confirm-actions {
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .btn-confirm {
    background: var(--accent);
    color: #000;
  }
  .btn-confirm:hover { background: var(--accent2); }
  .btn-cancel {
    background: var(--surface2);
    color: var(--dim);
    border: 1px solid var(--border);
  }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  /* Multiple matches */
  .matches-card {
    background: var(--surface);
    border: 1px solid var(--blue)44;
    border-radius: 16px;
    padding: 20px;
    max-width: 500px;
    margin: 0 auto 20px;
    display: none;
  }
  .matches-card.visible { display: block; }
  .matches-title { font-size: 13px; font-weight: 600; color: var(--blue); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }

  .match-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .match-item:hover { border-color: var(--accent); }
  .match-item:last-child { margin-bottom: 0; }
  .match-name { font-size: 14px; font-weight: 500; }
  .match-bek { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .match-storage { font-size: 11px; color: var(--dim); background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 40px 11px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent)66; }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Item list */
  .items-section {}
  .section-header {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 4px 0 8px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .section-header:first-child { border-top: none; margin-top: 0; }

  .item-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
    gap: 10px;
  }
  .item-row:hover { background: var(--surface); border-color: var(--border); }
  .item-row.updated { border-color: var(--green)44; background: #10b98108; }

  .item-bek {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 52px;
  }
  .item-desc {
    flex: 1;
    font-size: 13px;
  }
  .item-unit {
    font-size: 10px;
    color: var(--muted);
    max-width: 100px;
    text-align: right;
    line-height: 1.3;
  }
  .item-qty {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    min-width: 32px;
    text-align: center;
    color: var(--dim);
  }
  .item-qty.nonzero { color: var(--accent); }
  .item-qty.updated-flash { color: var(--green); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    font-weight: 600;
    font-size: 14px;
    padding: 12px 20px;
    border-radius: 10px;
    transition: transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); color: #fff; }

  /* Download btn */
  .download-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .download-btn:hover { border-color: var(--accent)66; color: var(--accent); }

  /* Pulse animation for listening */
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .orb.listening { animation: pulse 1.5s ease-in-out infinite; }

  .no-results { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }

  .shortcut-hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 6px;
  }
  .shortcut-hint kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🥗</div>
    <div>
      <div class="logo-text">Deli Counter</div>
      <div class="logo-sub">Keith's #184 — Waveland</div>
    </div>
  </div>
  <div class="header-right">
    <div class="badge">Updated: <span id="updatedCount">0</span></div>
    <button class="download-btn" onclick="downloadXLSX()">⬇ Export XLSX</button>
  </div>
</header>

<main>
  <!-- Voice Section -->
  <div class="voice-section">
    <div class="orb-wrap">
      <div class="orb" id="orb" onclick="toggleVoice()" title="Click to speak">
        <div class="orb-inner">
          <span id="orbIcon">🎤</span>
          <span class="orb-label" id="orbLabel">Tap to speak</span>
        </div>
      </div>
    </div>
    <div class="transcript-bubble" id="transcriptBubble">Say an item name, BEK number, or description...</div>
    <div class="shortcut-hint">Press <kbd>Space</kbd> to toggle voice · <kbd>Enter</kbd> to confirm</div>
  </div>

  <!-- Confirm Card -->
  <div class="confirm-card" id="confirmCard">
    <div class="confirm-item-name" id="confirmName"></div>
    <div class="confirm-item-meta">BEK# <span id="confirmBek"></span> · <span id="confirmStorage"></span> · <span id="confirmUnit"></span></div>
    <div class="qty-row">
      <div class="qty-label">How many did you save?</div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="adjustQty(-1)">−</button>
        <div class="qty-display" id="qtyDisplay">1</div>
        <button class="qty-btn" onclick="adjustQty(1)">+</button>
      </div>
    </div>
    <div class="confirm-actions">
      <button class="btn btn-cancel" onclick="cancelConfirm()">Cancel</button>
      <button class="btn btn-confirm" onclick="confirmUpdate()">✓ Update On Hand</button>
    </div>
  </div>

  <!-- Multiple Matches Card -->
  <div class="matches-card" id="matchesCard">
    <div class="matches-title">🔍 Multiple matches — which one?</div>
    <div id="matchesList"></div>
  </div>

  <!-- Search + Filter -->
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search by item name or BEK#..." oninput="renderList()">
    <span class="search-icon">🔍</span>
  </div>
  <div class="filter-tabs" id="filterTabs"></div>

  <!-- Items List -->
  <div id="itemsList"></div>
</main>

<div class="toast" id="toast"></div>

// State
let items = INVENTORY.map(i => ({...i}));
let currentItem = null;
let pendingQty = 1;
let recognition = null;
let listening = false;
let activeFilter = 'All';
let updatedRows = new Set();

// ── SEARCH / MATCH ───────────────────────────────────────────────────────────
function normalize(s) {
  return s.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
}

function scoreMatch(item, query) {
  const q = normalize(query);
  const desc = normalize(item.desc);
  const bek = item.bek.toLowerCase();

  // Exact BEK match
  if (bek === q) return 100;
  // BEK contains
  if (bek.includes(q)) return 90;
  // Exact desc match
  if (desc === q) return 85;
  // Desc starts with query
  if (desc.startsWith(q)) return 80;
  // All query words in desc
  const words = q.split(' ').filter(w => w.length > 1);
  const matches = words.filter(w => desc.includes(w));
  if (matches.length === words.length) return 60 + matches.length;
  // Partial word matches
  if (matches.length > 0) return 30 + matches.length * 5;
  return 0;
}

function findMatches(query) {
  if (!query.trim()) return [];
  const scored = items.map(item => ({ item, score: scoreMatch(item, query) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score);
  return scored.slice(0, 6).map(x => x.item);
}

// ── VOICE ────────────────────────────────────────────────────────────────────
function toggleVoice() {
  if (listening) {
    stopListening();
  } else {
    startListening();
  }
}

function startListening() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('Voice not supported in this browser. Try Chrome.', true);
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    listening = true;
    document.getElementById('orb').classList.add('listening');
    document.getElementById('orbIcon').textContent = '🔴';
    document.getElementById('orbLabel').textContent = 'Listening...';
    setTranscript('Listening...', true);
  };

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    setTranscript(final || interim, true);
    if (final) processVoiceInput(final.trim());
  };

  recognition.onerror = () => stopListening();
  recognition.onend = () => stopListening();
  recognition.start();
}

function stopListening() {
  listening = false;
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  document.getElementById('orb').classList.remove('listening');
  document.getElementById('orbIcon').textContent = '🎤';
  document.getElementById('orbLabel').textContent = 'Tap to speak';
}

function setTranscript(text, active) {
  const el = document.getElementById('transcriptBubble');
  el.textContent = text;
  el.className = 'transcript-bubble' + (active ? ' active' : '');
}

function processVoiceInput(text) {
  // Try to extract a number from the end ("I saved 3 cases of chicken patty")
  let qty = 1;
  const numMatch = text.match(/\b(\d+)\b/);
  if (numMatch) {
    qty = parseInt(numMatch[1]);
    text = text.replace(numMatch[0], '').trim();
  }

  // Normalize common speech artifacts
  text = text
    .replace(/\b(i have|i saved|i counted|saved|counted|we have|on hand)\b/gi, '')
    .replace(/\b(cases?|bags?|boxes?|packs?|sleeves?|units?|cans?)\b/gi, '')
    .trim();

  const matches = findMatches(text);

  if (matches.length === 0) {
    setTranscript(`No match for "${text}" — try searching below`, false);
    showToast('No item found. Try typing in search.', true);
  } else if (matches.length === 1) {
    openConfirm(matches[0], qty);
  } else {
    // Multiple matches
    openMatchesPicker(matches, qty);
  }
}

// ── CONFIRM CARD ─────────────────────────────────────────────────────────────
function openConfirm(item, qty = 1) {
  currentItem = item;
  pendingQty = Math.max(0, qty);
  document.getElementById('confirmName').textContent = item.desc;
  document.getElementById('confirmBek').textContent = item.bek;
  document.getElementById('confirmStorage').textContent = item.storage || 'N/A';
  document.getElementById('confirmUnit').textContent = item.unit || '';
  document.getElementById('qtyDisplay').textContent = pendingQty;
  document.getElementById('confirmCard').classList.add('visible');
  document.getElementById('matchesCard').classList.remove('visible');
  setTranscript(`Found: ${item.desc}`, true);
}

function cancelConfirm() {
  document.getElementById('confirmCard').classList.remove('visible');
  currentItem = null;
  setTranscript('Say an item name, BEK number, or description...', false);
}

function adjustQty(delta) {
  pendingQty = Math.max(0, pendingQty + delta);
  document.getElementById('qtyDisplay').textContent = pendingQty;
}

function confirmUpdate() {
  if (!currentItem) return;
  currentItem.on_hand = pendingQty;
  updatedRows.add(currentItem.row);
  document.getElementById('confirmCard').classList.remove('visible');
  document.getElementById('updatedCount').textContent = updatedRows.size;
  showToast(`✓ ${currentItem.desc} → ${pendingQty}`);
  setTranscript(`Updated ${currentItem.desc} to ${pendingQty}`, true);
  renderList();
  currentItem = null;
}

// ── MULTIPLE MATCHES ─────────────────────────────────────────────────────────
function openMatchesPicker(matches, qty) {
  const list = document.getElementById('matchesList');
  list.innerHTML = '';
  matches.forEach(item => {
    const div = document.createElement('div');
    div.className = 'match-item';
    div.innerHTML = `
      <div>
        <div class="match-name">${item.desc}</div>
        <div class="match-bek">BEK# ${item.bek}</div>
      </div>
      <div class="match-storage">${item.storage || '—'}</div>`;
    div.onclick = () => openConfirm(item, qty);
    list.appendChild(div);
  });
  document.getElementById('matchesCard').classList.add('visible');
  document.getElementById('confirmCard').classList.remove('visible');
}

// ── FILTER TABS ───────────────────────────────────────────────────────────────
function buildTabs() {
  const storages = ['All', ...new Set(items.map(i => i.storage).filter(Boolean).map(s => s.trim()))];
  const clean = ['All', 'Dry Food', 'Dry Container', 'Frozen', 'Refrigerator'];
  const tabs = document.getElementById('filterTabs');
  tabs.innerHTML = '';
  clean.forEach(label => {
    const div = document.createElement('div');
    div.className = 'tab' + (label === activeFilter ? ' active' : '');
    div.textContent = label;
    div.onclick = () => { activeFilter = label; buildTabs(); renderList(); };
    tabs.appendChild(div);
  });
}

// ── ITEM LIST ─────────────────────────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = items.filter(item => {
    const matchSearch = !q ||
      item.desc.toLowerCase().includes(q) ||
      item.bek.toLowerCase().includes(q);
    const matchFilter = activeFilter === 'All' ||
      (item.storage || '').toLowerCase().includes(activeFilter.toLowerCase());
    return matchSearch && matchFilter;
  });

  const container = document.getElementById('itemsList');
  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No items match that search.</div>';
    return;
  }

  // Group by storage
  const groups = {};
  filtered.forEach(item => {
    const g = item.storage || 'Other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(item);
  });

  Object.entries(groups).forEach(([group, groupItems]) => {
    const header = document.createElement('div');
    header.className = 'section-header';
    header.textContent = group;
    container.appendChild(header);

    groupItems.forEach(item => {
      const row = document.createElement('div');
      row.className = 'item-row' + (updatedRows.has(item.row) ? ' updated' : '');
      const qtyClass = item.on_hand > 0 ? 'nonzero' : '';
      row.innerHTML = `
        <div class="item-bek">${item.bek}</div>
        <div class="item-desc">${item.desc}</div>
        <div class="item-unit">${item.unit || ''}</div>
        <div class="item-qty ${qtyClass}">${item.on_hand}</div>`;
      row.onclick = () => openConfirm(item, item.on_hand || 1);
      container.appendChild(row);
    });
  });
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function downloadXLSX() {
  // Build a simple worksheet with updated inventory
  const wsData = [
    ['BEK #', 'Description', 'Storage', 'Unit', 'On Hand'],
    ...items.map(i => [i.bek, i.desc, i.storage, i.unit, i.on_hand])
  ];

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws['!cols'] = [{ wch: 10 }, { wch: 50 }, { wch: 15 }, { wch: 25 }, { wch: 10 }];

  XLSX.utils.book_append_sheet(wb, ws, 'Inventory');
  XLSX.writeFile(wb, `Deli_Inventory_Updated_${new Date().toISOString().split('T')[0]}.xlsx`);
  showToast('📥 XLSX exported!');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 3000);
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); toggleVoice(); }
  if (e.code === 'Enter' && currentItem) confirmUpdate();
  if (e.code === 'Escape') cancelConfirm();
  if (e.code === 'ArrowUp') adjustQty(1);
  if (e.code === 'ArrowDown') adjustQty(-1);
});

// ── INIT ──────────────────────────────────────────────────────────────────────
buildTabs();
renderList();
</script>
